site_name: Fitness Tracker
site_description: A daily workout tracker with read-only month-to-month progress history.
site_author: Fitness Tracker
site_url: !ENV [SITE_URL, ""]
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

validation:
  omitted_files: ignore

theme:
  name: material
  language: en
  favicon: assets/images/fitness-mark.svg
  icon:
    logo: material/dumbbell
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: teal
      accent: lime
  features:
    - navigation.top

plugins: []

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/weekly-planner.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Fitness Tracker: index.md
